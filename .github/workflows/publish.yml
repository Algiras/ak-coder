name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (must match apps/cli/package.json version, e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:coverage:check

      - name: Prepare publish bundle
        run: |
          cp README.md apps/cli/README.md
          bun run build --filter @algiras/ak-coder

      - name: Verify tarball
        run: bun publish --dry-run --access public
        working-directory: apps/cli

      - name: Publish to npm
        run: bun publish --access public
        working-directory: apps/cli
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
